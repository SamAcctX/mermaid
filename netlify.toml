# Settings in the [build] context are global and are applied to
# all contexts unless otherwise overridden by more specific contexts.
[build]
  # Directory where the build system installs dependencies
  # and runs your build. Store your package.json, .nvmrc, etc here.
  # If not set, defaults to the root directory.
  base = ""

  # Directory that contains the deploy-ready HTML files and
  # assets generated by the build. This is an absolute path relative
  # to the base directory, which is the root by default (/).
  # This sample publishes the directory located at the absolute
  # path "root/project/build-output"

  publish = "mermaid-live-editor/docs"

  # Default build command.
  command = "./scripts/editor.bash"

[build.environment]
  # `scripts/editor.bash` clones and builds the Mermaid Live Editor, which
  # requires Node >=24.16.0 (see mermaid-live-editor/.node-version). That is
  # newer than the repo's root `.node-version` (used by the rest of CI), and
  # Netlify would otherwise fall back to an incompatible default, failing the
  # live editor's `pnpm install` with ERR_PNPM_UNSUPPORTED_ENGINE. Pin the
  # deploy-preview build to a compatible version. This only affects Netlify.
  NODE_VERSION = "24.16.0"
